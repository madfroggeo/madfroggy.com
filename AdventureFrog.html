<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">

    <meta name="viewport"
          content="widthb=device-width, initial-scale=1.0">

    <title>ADVENTURE FROG</title>
    <link rel="icon" type="image/x-icon" href="MADFROGGY NEW LOGO FINAL-1.png (1).ico">

    <link rel="stylesheet" href="General_game.css">

</head>

<body>

    <!-- ===================== TOP NAV ===================== -->

    <div class="top_nav">

        <img class="logo"
             src="MADFROGGY NEW LOGO FINAL-1.png (1).png"
             alt="Logo"
             onclick="goHome()">

        <div class="home"
             onclick="window.location.href='/'">
            HOME
        </div>

        <div class="games"
             onclick="window.location.href='/#games-section'">
            GAMES
        </div>

        <div class="links"
             onclick="window.location.href='/#links-section'">
            LINKS
        </div>

    </div>

    <!-- ===================== MAIN CONTENT ===================== -->

    <div class="container">

        <div class="content_wrapper">

            <div class="container_img black_box">

                <img id="frogImage"
                     class="adfgPic"
                     src="AdventureFrog/AdventureFrogFront.png"
                     alt="Adventure Frog">

                <div class="button_row">

                    <button class="arrow"
                            onclick="prevImage()">&lt;-
                    </button>

                    <button class="arrow"
                            onclick="nextImage()">-&gt;
                    </button>

                </div>

            </div>
            <!-- MOVE DOWNLOADS OUTSIDE ABOUT -->
<div class="downloads_container">

    <div class="downloads">
        <h2>Downloads</h2>

        <a href="AdventureFrog/Adventure_FrogV2_Windows.zip" download>
            Windows
        </a>

        <br><br>

        <a href="AdventureFrog/Adventure_FrogV2_macOS.zip" download>

        <a href="AdventureFrog/Adventure_FrogV2.AppImage" download>

        <br>
        </a>
        <br>
    </div>

</div>

        </div>

<div class="about">

    <h1 class="title">
        ADVENTURE&nbsp;FROG
    </h1>

    <p>
        He's the hero of frog town, but then he realises
        that he's... trapped in a videogame?!?
        <br><br><br>

        Adventure Frog is a top-down adventure game inspired
        by the Zelda series where you have to escape your
        reality into the real world.
    </p>

</div>

        </div>

    </div>

    <!-- ===================== SCRIPT ===================== -->

    <script>

    const images = [
        "AdventureFrog/AdventureFrogFront.png",
        "AdventureFrog/AdventureFrogBack.png"
    ];

    let index = 0;

    function showImage() {
        document.getElementById("frogImage").src = images[index];
    }

    function nextImage() {
        index = (index + 1) % images.length;
        showImage();
    }

    function prevImage() {
        index = (index - 1 + images.length) % images.length;
        showImage();
    }

    function goHome() {
        window.location.href = "/";
    }

    </script>

</body>
</html>
